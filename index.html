<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mage Battle Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hud-panel">
        <div>
          <p class="eyebrow">Pixel Duel Prototype</p>
          <h1>Mage Battle</h1>
        </div>
        <div class="controls-copy">
          <p><strong>Movimento</strong>: clique direito no campo</p>
          <p><strong>Mira</strong>: mouse</p>
          <p><strong>Magias</strong>: Q fireball, W stun shot, E speed boost, R thunder strike</p>
          <p><strong>Arena</strong>: campo ampliado para o duelo</p>
          <p><strong>Reiniciar</strong>: espaço após o duelo</p>
        </div>
      </section>
      <div class="game-frame">
        <canvas id="game" aria-label="Arena de duelo mágico"></canvas>
      </div>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
